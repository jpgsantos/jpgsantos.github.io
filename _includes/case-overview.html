{% for item in include.items limit: include.limit %}
  {% if include.variant == "mondrian" %}
  <article class="mond-tile {% if forloop.first %}mond-tile--red case-tile--problem{% else %}mond-tile--blue case-tile--ownership{% endif %}" data-content-list="case-overview" data-content-key="{{ item.label | slugify }}" data-content-value="{{ item.title | strip_html | normalize_whitespace }}">
    <p class="mond-eyebrow">{{ item.label }}</p>
    <h2>{{ item.title }}</h2>
    <p>{{ item.body }}</p>
  </article>
  {% else %}
  <article class="case-study__statement {% if forloop.first %}case-study__statement--accent{% else %}case-study__statement--secondary{% endif %}" data-content-list="case-overview" data-content-key="{{ item.label | slugify }}" data-content-value="{{ item.title | strip_html | normalize_whitespace }}">
    <p class="eyebrow">{{ item.label }}</p>
    <h2>{{ item.title }}</h2>
    <p>{{ item.body }}</p>
  </article>
  {% endif %}
{% endfor %}
