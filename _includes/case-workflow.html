{% assign workflow = include.workflow %}
{% if include.variant == "mondrian" %}
<article class="mond-tile case-tile--workflow" data-content-key="case-workflow" data-content-value="{{ workflow.title | strip_html | normalize_whitespace }}">
  <p class="mond-eyebrow">{{ workflow.label }}</p>
  <h2>{{ workflow.title }}</h2>
  <p>{{ workflow.body }}</p>
</article>
{% else %}
<section class="case-section" data-content-key="case-workflow" data-content-value="{{ workflow.title | strip_html | normalize_whitespace }}">
  <p class="eyebrow">{{ workflow.label }}</p>
  <h2>{{ workflow.title }}</h2>
  <p>{{ workflow.body }}</p>
</section>
{% endif %}
