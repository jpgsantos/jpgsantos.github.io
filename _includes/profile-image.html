{% assign profile = site.data.profile %}
<picture class="profile-picture">
  <source
    type="image/webp"
    srcset="{{ '/assets/images/profile-320.webp' | relative_url }} 320w, {{ '/assets/images/profile-640.webp' | relative_url }} 640w"
    sizes="{{ include.sizes | default: '220px' }}"
  >
  <img
    src="{{ '/assets/images/profile-320.jpg' | relative_url }}"
    srcset="{{ '/assets/images/profile-320.jpg' | relative_url }} 320w, {{ '/assets/images/profile-640.jpg' | relative_url }} 640w"
    sizes="{{ include.sizes | default: '220px' }}"
    alt="{{ include.alt | default: profile.name | escape }}"
    {% if include.class %}class="{{ include.class }}"{% endif %}
    loading="{{ include.loading | default: 'lazy' }}"
    decoding="async"
    {% if include.width %}width="{{ include.width }}"{% endif %}
    {% if include.height %}height="{{ include.height }}"{% endif %}
    {% if include.fetchpriority %}fetchpriority="{{ include.fetchpriority }}"{% endif %}
  >
</picture>
