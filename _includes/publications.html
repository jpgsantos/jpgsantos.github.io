<div class="publications-list">
  {% for pub in site.data.publications %}
  <article class="publication-card" data-reveal data-content-list="publications" data-content-key="{{ pub.doi }}" data-content-value="{{ pub.title | strip_html | normalize_whitespace }}">
    <div class="publication-card__year">{{ pub.year }}</div>
    <div class="publication-card__body">
      <h3>{{ pub.title }}</h3>
      <p class="publication-card__authors">{{ pub.authors | replace: "Santos, JPG", "<strong>Santos, JPG</strong>" }}</p>
      <p><em>{{ pub.journal }}</em>, {{ pub.volume }}.</p>
      <a href="https://doi.org/{{ pub.doi }}" target="_blank" rel="noopener noreferrer" class="text-link">
        DOI: {{ pub.doi }} {% include icon.html name="external" %}
      </a>
    </div>
  </article>
  {% endfor %}
</div>
