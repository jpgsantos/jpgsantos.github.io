<figure class="porphyrin-paper-visual porphyrin-paper-visual--default-grid">
  <div class="porphyrin-paper-visual__image">
    {% include porphyrin-paper-evidence.html variant="default" %}
    <span class="porphyrin-paper-visual__image-label" data-image-overlay>Experimental TEM / SEM</span>
  </div>

  <figcaption class="porphyrin-paper-visual__caption">
    <span>Published evidence / 0.01 M HCl</span>
    <strong>Faceted porphyrin solids resolved from 100 nm to 2 &micro;m.</strong>
    <a href="https://doi.org/10.1016/j.tet.2016.09.030" target="_blank" rel="noopener noreferrer">Figure crops from Frigerio et al., <em>Tetrahedron</em> 72 (2016)</a>
  </figcaption>

  <div class="porphyrin-paper-visual__reactants" aria-label="Porphyrin reactants">
    <div>
      <span>Octacation</span>
      <strong>NiTBTAP8+</strong>
    </div>
    <span class="porphyrin-paper-visual__operator" aria-hidden="true">+</span>
    <div>
      <span>TPPS-derived ions</span>
      <strong>MTPPS / H4TPPS</strong>
    </div>
  </div>

  <div class="porphyrin-paper-visual__families" aria-label="Resulting material families">
    <div><span>01</span><strong>Binary</strong></div>
    <div><span>02</span><strong>Ternary</strong></div>
    <div><span>03</span><strong>Variable composition</strong></div>
  </div>
</figure>
