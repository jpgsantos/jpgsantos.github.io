{% assign case_visual = include.visual %}
<section class="case-study__visual case-study__visual--porphyrin" aria-label="{{ case_visual.aria_label }}" data-content-key="case-visual" data-content-value="{{ case_visual.type }}">
  <div class="case-porphyrin-visual">
    {% include porphyrin-paper-visual.html variant="default" %}
  </div>
  <div class="case-porphyrin-copy" data-content-key="case-visual-copy" data-content-value="{{ case_visual.title | strip_html | normalize_whitespace }}">
    <p class="eyebrow">{{ case_visual.label }}</p>
    <h2>{{ case_visual.title }}</h2>
    <p>{{ case_visual.body }}</p>
  </div>
</section>
