{% for section in include.sections limit: include.limit %}
<section class="case-section" data-content-list="case-sections" data-content-key="{{ section.label | slugify }}" data-content-value="{{ section.title | strip_html | normalize_whitespace }}">
  <p class="eyebrow">{{ section.label }}</p>
  <h2>{{ section.title }}</h2>
  <div class="case-feature-list">
    {% for feature in section.features %}
    <article class="case-feature" data-content-list="case-features" data-content-key="{{ section.label | slugify }}:{{ feature.title | slugify }}" data-content-value="{{ feature.title | strip_html | normalize_whitespace }}">
      <span class="case-feature__icon">{% include icon.html name=feature.icon %}</span>
      <div>
        <h3>{{ feature.title }}</h3>
        <p>{{ feature.body }}</p>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endfor %}
