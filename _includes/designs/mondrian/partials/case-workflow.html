{% assign workflow = include.workflow %}
<article class="mond-tile case-tile--workflow" data-content-key="case-workflow" data-content-value="{{ workflow.title | strip_html | normalize_whitespace }}">
  <p class="mond-eyebrow">{{ workflow.label }}</p>
  <h2>{{ workflow.title }}</h2>
  <p>{{ workflow.body }}</p>
</article>
