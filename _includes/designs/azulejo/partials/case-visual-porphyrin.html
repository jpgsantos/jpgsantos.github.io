{% assign case_visual = include.visual %}
<section class="az-case-visual az-case-visual--porphyrin" aria-label="{{ case_visual.aria_label }}" data-content-key="case-visual" data-content-value="{{ case_visual.type }}">
  {% include designs/azulejo/partials/porphyrin-plate.html %}
  <div class="az-case-visual__copy" data-content-key="case-visual-copy" data-content-value="{{ case_visual.title | strip_html | normalize_whitespace }}">
    <p class="az-kicker">{{ case_visual.label }}</p>
    <h2>{{ case_visual.title }}</h2>
    <p>{{ case_visual.body }}</p>
  </div>
</section>
