{% assign case_facts = include.facts %}
{% if include.variant == "mondrian" %}
  {% for fact in case_facts %}
  <div class="mond-tile case-tile--meta case-tile--meta-{{ forloop.index }}" data-content-list="case-facts" data-content-key="{{ fact.label | slugify }}" data-content-value="{{ fact.value | strip_html | normalize_whitespace }}">
    <p class="mond-eyebrow">{{ fact.label }}</p>
    <p class="case-meta__value">{{ fact.mondrian_value | default: fact.value }}</p>
  </div>
  {% endfor %}
{% else %}
  <dl class="case-study__facts" aria-label="Project facts">
    {% for fact in case_facts %}
    <div data-content-list="case-facts" data-content-key="{{ fact.label | slugify }}" data-content-value="{{ fact.value | strip_html | normalize_whitespace }}">
      <dt>{{ fact.label }}</dt>
      <dd>{{ fact.value }}</dd>
    </div>
    {% endfor %}
  </dl>
{% endif %}
