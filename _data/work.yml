            title: "Modern Android UI"
            body: "Used Kotlin, Jetpack Compose, Navigation Compose, semantic typography, and responsive layouts for compact phones and tablets."
          - icon: "database"
            title: "Realtime data layer"
            body: "Structured a Firebase-first architecture around Firestore snapshot listeners, offline persistence, cached reads/writes, repository flows, ViewModels, and Hilt."
          - icon: "calendar-check"
            title: "Background work"
            body: "Used WorkManager for task deadlines and reminders, with Android notification channels and deep links into the relevant task flow."
    workflow:
      label: "Workflow"
      title: "Collaborator-ready process, even as a solo project."
