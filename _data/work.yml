        title: "End-to-end delivery from concept to Play Console testing."
        body: "I handled the full development lifecycle: product definition, architecture, Firebase data modeling, responsive Compose UI, offline behavior, realtime sync, background deadlines, notifications, testing, Git workflow, documentation, production packaging, and Play Console deployment."
