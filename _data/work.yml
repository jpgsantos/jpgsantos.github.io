        title: "Core app flows"
        features:
          - icon: "users"
            title: "Households"
            body: "Users authenticate with Firebase Auth, create or join houses with invite codes, and keep separate spaces for roommates, couples, or families."
          - icon: "target"
            title: "Bidding"
            body: "Members bid on chores before a deadline. The app assigns the task to the lowest bidder and handles ties explicitly instead of hiding edge cases."
          - icon: "calendar-check"
            title: "Accountability"
            body: "Recurring chores, due dates, calendar views, local notifications, and progress statistics keep effort visible over time."
