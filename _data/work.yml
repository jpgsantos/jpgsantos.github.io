- slug: "subcellular-workflow"
  title: "Subcellular Workflow"
  eyebrow: "Jan 2016 - Mar 2025 · PhD project"
  category: "Scientific software"
  icon: "brain"
  url: "/projects/subcellular-workflow/"
  description: "A modular, FAIR-compliant MATLAB framework for ODE biochemical pathway modeling, analysis, and parameterization."
  problem: "ODE-based biological models become hard to build, parameterize, analyze, and share when each lab relies on bespoke scripts."
  contribution: "Architected the framework, implemented parameter estimation, sensitivity analysis, and profile likelihood analysis, and connected MATLAB tooling with COPASI and standard formats."
  outcome: "Validated the workflow across systems biology and neuroscience models and published the work in Neuroinformatics."
  highlights:
    - "Architected and built a comprehensive scientific software framework following FAIR principles"
    - "Implemented algorithms from scientific literature for parameter estimation, sensitivity analysis, and profile likelihood analysis"
    - "Engineered interfaces between MATLAB solvers, COPASI, SBML, and SBtab"
    - "Created documentation and managed Git/GitHub collaboration across institutions"
  stack:
    - "MATLAB"
    - "SimBiology"
    - "Optimization Toolbox"
    - "Python"
    - "COPASI"
    - "Git"
    - "SBML"
    - "SBtab"
  links:
    - text: "Case study"
      url: "/projects/subcellular-workflow/"
      icon: "arrow-right"
      external: false
      primary: true
    - text: "GitHub"
      url: "https://github.com/jpgsantos/Subcellular_Workflow"
      icon: "github"
      external: true
    - text: "Documentation"
      url: "https://subcellular-workflow.readthedocs.io/"
      icon: "book"
      external: true
    - text: "Publication"
      url: "https://doi.org/10.1007/s12021-021-09546-3"
      icon: "file"
      external: true
  case:
    eyebrow: "Case study / scientific software"
    mondrian_eyebrow: "Case study &middot; scientific software"
    title: "Subcellular Workflow"
    lede: "A modular, FAIR-compliant MATLAB framework for ODE biochemical pathway modeling, simulation, parameter estimation, global sensitivity analysis, and profile likelihood analysis. Thesis: <em>A workflow for developing biochemical pathway models using ordinary differential equations</em>."
    facts:
      - label: "Timeframe"
        value: "Jan 2016-Mar 2025"
        mondrian_value: "Jan 2016 &ndash; Mar 2025"
      - label: "Role"
        value: "Architect and developer"
      - label: "Domain"
        value: "Systems biology, neuroscience"
      - label: "Stack"
        value: "MATLAB, Python, COPASI, Git"
    overview:
      - label: "Problem"
        title: "Make biochemical pathway modeling reproducible and adoptable."
        body: "ODE-based biological models can be hard to build, parameterize, analyze, and share when each lab relies on bespoke scripts. The goal was a workflow that supports initialization, simulation, parameter estimation, sensitivity analysis, and profile likelihood analysis while following FAIR principles."
      - label: "Contribution"
        title: "Designed the framework and implemented the analysis pipeline."
        body: "I architected and built the framework, implemented algorithms from the scientific literature, engineered interfaces between MATLAB solvers and COPASI, created documentation, and managed Git/GitHub collaboration across institutions."
    visual:
      type: "workflow"
      aria_label: "Subcellular Workflow architecture"
      label: "Reusable ODE modeling pipeline"
      title: "From setup to validated model analysis."
      body: "The workflow connects model initialization, simulation, parameter estimation, local and global sensitivity analysis, and profile likelihood analysis into a reproducible scientific software process."
    sections:
      - label: "Implementation details"
        title: "Core capabilities"
        features:
          - icon: "cogs"
            title: "Model setup"
            body: "Structured model initialization and data handling for biochemical pathway models, with attention to standard formats like SBML and SBtab."
          - icon: "sliders"
            title: "Parameterization"
            body: "Methods for parameter estimation and model calibration using MATLAB and scientific optimization tooling."
          - icon: "search"
            title: "Model analysis"
            body: "Local and global sensitivity analysis plus profile likelihood analysis to understand model behavior and parameter identifiability."
      - label: "Validation"
        title: "From simple motifs to basal ganglia signaling"
        features:
          - icon: "cogs"
            title: "LIRMO &amp; LIREM"
            body: "Ligand-receptor interactions and ligand-receptor-effector responses validated as small reference models for the workflow."
          - icon: "sliders"
            title: "TM-M (CaMKII)"
            body: "Translated complex CaMKII autophosphorylation dynamics into ODE form for medium-scale validation."
          - icon: "search"
            title: "G-PIPK striatal model"
            body: "Pushed the framework into larger parameter spaces: intensive parameter estimation and PLA on an Intel i9-10980XE workstation. Resulted in a peer-reviewed Neuroinformatics paper."
    workflow:
      label: "Workflow"
      title: "FAIR-compliant scientific code with standard-tool interoperability."
      body: "The framework follows FAIR principles for findable, accessible, interoperable, and reusable research software, integrates standard formats, and uses Git workflows for cross-institutional collaboration."
    architecture_heading: "Pipeline"
    architecture:
      - label: "Setup"
        value: "Model + data"
      - label: "Simulation"
        value: "MATLAB solvers"
      - label: "Estimation"
        value: "Optimization"
      - label: "Analysis"
        value: "Sensitivity / PLA"
      - label: "Standards"
