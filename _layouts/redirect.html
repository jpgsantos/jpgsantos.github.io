<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://jpgsantos.github.io{{ site.baseurl }}{{ page.redirect_target }}">
    <meta http-equiv="refresh" content="0; url={{ page.redirect_target | relative_url }}">
    <script>
      window.location.replace("{{ page.redirect_target | relative_url }}");
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="{{ page.redirect_target | relative_url }}">{{ page.redirect_label | default: page.redirect_target }}</a>.</p>
  </body>
</html>
