<section class="error-page">
  <div class="error-page__content">
    <div class="surface-card__icon">{% include icon.html name="search" %}</div>
    <p class="eyebrow">404</p>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has moved.</p>

      <a href="{{ '/' | relative_url }}" class="button button--primary">

      </a>
      <a href="{{ '/#contact' | relative_url }}" class="button button--secondary">
        {% include icon.html name="email" %} Contact
      </a>
    </div>
  </div>
</section>
